# Doko CLI 配置

# Spring 配置
spring:
  main:
    web-application-type: none
    banner-mode: off
  # Spring AI（当前仍用 KimiModelClient；若改用 ChatModel 可设 ai.model.chat=openai）
  ai:
    model:
      chat: none
    openai:
      base-url: https://api.moonshot.cn/v1
      # 这里直接写死 Kimi 的 API Key，如需更安全可以改回使用环境变量
      api-key: sk-6s2yFxmlBbZfRavIfG03iaIj7DkpOjWd2LN13JPFOZoqQXQW
      chat:
        options:
          model: kimi-k2.5

# Kimi 配置（KimiModelClient 使用）
kimi:
  # 与上面的 spring.ai.openai.api-key 保持一致，直接写死，方便本地使用
  api-key: sk-6s2yFxmlBbZfRavIfG03iaIj7DkpOjWd2LN13JPFOZoqQXQW
  model: kimi-k2.5

# 日志配置
logging:
  level:
    com.dokocli: INFO
    root: WARN
  pattern:
    console: "%d{HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

